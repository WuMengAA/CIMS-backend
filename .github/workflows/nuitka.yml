name: Build and Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check .

      - name: Run black
        run: black --check .

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e .

      - name: Build protobuf (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $protoFiles = Get-ChildItem src/cims/Protobuf -Recurse -Filter *.proto | ForEach-Object { $_.FullName }
          python -m grpc_tools.protoc --proto_path=src/cims --python_out=src/cims --grpc_python_out=src/cims $protoFiles
      - name: Build protobuf (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          find src/cims/Protobuf -type f -name "*.proto" | xargs python -m grpc_tools.protoc --proto_path=src/cims --python_out=src/cims --grpc_python_out=src/cims

      - name: Install Linux-specific Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y mold clang

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        uses: Nuitka/Nuitka-Action@main
        with:
          script-name: src/cims/CIMS.py
          output-file: CIMS-backend
          include-data-dir: src/cims/Datas=Datas
          disable-console: false
          product-name: CIMS-backend

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: Nuitka/Nuitka-Action@main
        env:
          CC: clang
          CXX: clang++
          LDFLAGS: "-fuse-ld=mold"
        with:
          script-name: src/cims/CIMS.py
          output-file: CIMS-backend
          include-data-dir: src/cims/Datas=Datas
          product-name: CIMS-backend

      - name: Upload unsigned application
        uses: actions/upload-artifact@v4
        with:
          name: CIMS-backend-${{ matrix.os }}
          path: build/CIMS.dist
